<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Joy Blob - My Pet App</title>
    <style>
        /* สไตล์ที่จำเป็นสำหรับแอป */
        body { font-family: 'Kanit', sans-serif; background: #cbd5e1; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 390px; height: 844px; background: white; border-radius: 40px; border: 10px solid #1e293b; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { padding: 40px 20px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .nav { height: 80px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #e2e8f0; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { padding: 15px; background: #60a5fa; color: white; border: none; border-radius: 15px; width: 100%; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone">
    <header class="header">
        <div id="status">เงิน: 12,450 🪙</div>
    </header>
    
    <main class="content">
        <!-- หน้าโฮม -->
        <section id="home" class="screen active">
            <div style="font-size: 100px; text-align: center; margin: 50px 0;">💧</div>
            <button class="btn" onclick="showScreen('diary')">ไปหน้าไดอารี่</button>
        </section>

        <!-- หน้าไดอารี่ -->
        <section id="diary" class="screen">
            <h2>ไดอารี่อารมณ์ 📔</h2>
            <div id="calendar" style="margin: 20px 0; font-weight: bold;"></div>
            <textarea id="note" style="width:100%; height:100px;" placeholder="วันนี้รู้สึกยังไงบ้าง?"></textarea>
            <button class="btn" onclick="saveNote()">บันทึก</button>
            <button class="btn" style="background:#94a3b8" onclick="showScreen('home')">ย้อนกลับ</button>
        </section>
    </main>

    <nav class="nav">
        <div onclick="showScreen('home')">🏠 โฮม</div>
        <div onclick="showScreen('diary')">📔 ไดอารี่</div>
    </nav>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveNote() {
        alert("บันทึกสำเร็จ!");
    }

    // ระบบปฏิทินแบบ Dynamic
    const date = new Date();
    document.getElementById('calendar').innerText = 
        date.toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
</script>

</body>
</html>
