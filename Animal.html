<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob - Complete Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS สไตล์ทั้งหมดรวมอยู่ที่นี่ */
        body { font-family: 'Kanit', sans-serif; background: #cbd5e1; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 390px; height: 844px; background: linear-gradient(180deg, #e0f2fe 0%, #f3e8ff 100%); border-radius: 40px; border: 10px solid #1e293b; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .screen { display: none; height: 100%; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        .nav { height: 80px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #e2e8f0; }
        .btn { padding: 15px; background: #a855f7; color: white; border: none; border-radius: 15px; width: 100%; margin-bottom: 10px; cursor: pointer; text-align: center; }
        .stat-bar { width: 100%; height: 20px; background: #e2e8f0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; position: relative; }
        .fill { height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="phone">
    <!-- Header -->
    <div style="padding: 40px 20px 10px;">
        <div class="stat-bar"><div id="hpFill" class="fill" style="background:#fb7185; width:90%"></div></div>
        <div class="stat-bar"><div id="enFill" class="fill" style="background:#fbbf24; width:80%"></div></div>
        <div id="status">เงิน: <span id="coins">12,450</span> 🪙</div>
    </div>
    
    <main class="content" style="flex:1;">
        <!-- Screen 1: Home -->
        <section id="screen-1" class="screen active">
            <div id="blob" style="font-size: 120px; text-align: center; margin: 40px 0;">💧</div>
            <button class="btn" onclick="nav('screen-4')">ไปหน้าบ้าน</button>
            <button class="btn" onclick="nav('screen-12')">ไปไดอารี่</button>
        </section>

        <!-- Screen 4: House (Map) -->
        <section id="screen-4" class="screen">
            <h3>บ้านของน้อง</h3>
            <button class="btn" onclick="nav('screen-5')">ห้องนอน</button>
            <button class="btn" onclick="nav('screen-6')">ห้องอาหาร</button>
            <button class="btn" onclick="nav('screen-1')">กลับ</button>
        </section>

        <!-- Screen 5: Bedroom -->
        <section id="screen-5" class="screen">
            <h3>ห้องนอน</h3>
            <button class="btn" onclick="sleepAction()">นอนหลับ (⚡+15)</button>
            <button class="btn" onclick="nav('screen-4')">กลับ</button>
        </section>

        <!-- Screen 6: Dining -->
        <section id="screen-6" class="screen">
            <h3>ห้องอาหาร</h3>
            <button class="btn" onclick="feedAction()">ให้อาหาร (💖+5)</button>
            <button class="btn" onclick="nav('screen-4')">กลับ</button>
        </section>

        <!-- Screen 12: Diary -->
        <section id="screen-12" class="screen">
            <h3>ไดอารี่ 📔</h3>
            <textarea id="note" style="width:100%; height:100px;"></textarea>
            <button class="btn" onclick="saveNote()">บันทึก</button>
            <button class="btn" onclick="nav('screen-1')">กลับ</button>
        </section>
    </main>

    <!-- Navigation -->
    <nav class="nav">
        <div onclick="nav('screen-1')">🏠 โฮม</div>
        <div onclick="nav('screen-12')">📔 ไดอารี่</div>
    </nav>
</div>

<script>
    let state = { hp: 45, en: 20, coins: 12450 };

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateUI() {
        document.getElementById('hpFill').style.width = (state.hp/50)*100 + "%";
        document.getElementById('enFill').style.width = (state.en/50)*100 + "%";
        document.getElementById('coins').innerText = state.coins;
    }

    function feedAction() {
        state.hp = Math.min(50, state.hp + 5);
        document.getElementById('blob').innerText = "😋";
        setTimeout(() => document.getElementById('blob').innerText = "💧", 1000);
        updateUI();
    }

    function sleepAction() {
        state.en = Math.min(50, state.en + 15);
        document.getElementById('blob').innerText = "😴";
        setTimeout(() => document.getElementById('blob').innerText = "💧", 2000);
        updateUI();
    }

    function saveNote() {
        alert("บันทึกแล้ว!");
        state.coins += 20;
        updateUI();
    }
</script>
</body>
</html>
