<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob - App</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* สไตล์หลักและโครงสร้าง */
        body { font-family: 'Kanit', sans-serif; background: #cbd5e1; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 390px; height: 844px; background: #f5f3ff; border-radius: 40px; border: 10px solid #1e293b; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .header { background: white; padding: 40px 20px 20px; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* สไตล์หน้าไดอารี่ */
        .calendar-box { background: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; margin-bottom: 15px; border: 1px solid #ddd; }
        .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { padding: 12px; border: none; border-radius: 12px; width: 100%; cursor: pointer; background: #a855f7; color: white; font-family: inherit; font-weight: 600; }
        
        /* Nav */
        .nav { height: 70px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #e2e8f0; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="phone">
    <header class="header">
        <div id="status">เงิน: 12,450 🪙 | เลเวล: 8</div>
    </header>
    
    <main class="content">
        <!-- หน้าโฮม -->
        <section id="home" class="screen active">
            <div style="font-size: 120px; text-align: center; margin: 40px 0;">💧</div>
            <div style="background:white; padding:15px; border-radius:20px; text-align:center;">วันนี้มีความสุขไหมคะ?</div>
        </section>

        <!-- หน้าไดอารี่ -->
        <section id="diary" class="screen">
            <h3>บันทึกอารมณ์ 📔</h3>
            <div class="calendar-box" id="currentDate"></div>
            <div class="mood-grid">
                <div onclick="selectMood('😄')">😄</div>
                <div onclick="selectMood('😢')">😢</div>
                <div onclick="selectMood('😡')">😡</div>
                <div onclick="selectMood('😌')">😌</div>
            </div>
            <textarea id="note" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
            <button class="btn" onclick="saveDiary()">บันทึก</button>
        </section>
    </main>

    <nav class="nav">
        <div class="nav-item" onclick="showScreen('home')">🏠<br>โฮม</div>
        <div class="nav-item" onclick="showScreen('diary')">📔<br>ไดอารี่</div>
    </nav>
</div>

<script>
    // ระบบเปลี่ยนหน้า
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ระบบปฏิทินอัจฉริยะ (แสดงวันที่จริง)
    function updateCalendar() {
        const d = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = d.toLocaleDateString('th-TH', options);
    }

    function saveDiary() {
        alert("บันทึกสำเร็จ! ได้รับรางวัล +20 Coins");
    }

    // เริ่มทำงาน
    updateCalendar();
</script>

</body>
</html>
