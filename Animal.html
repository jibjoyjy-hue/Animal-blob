<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob App - Full Integration</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #e0f2fe; 
            --primary-blue: #60a5fa;
            --hp-color: #fb7185;
            --energy-color: #fbbf24;
            --text-main: #334155;
            --text-muted: #94a3b8;
            --font-thai: 'Kanit', sans-serif;
            --phone-width: 390px;
            --phone-height: 844px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body { background-color: #cbd5e1; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: var(--font-thai); }

        .phone-frame {
            width: var(--phone-width); height: var(--phone-height);
            background: linear-gradient(180deg, #e0f2fe 0%, #f3e8ff 100%);
            border: 12px solid #1e293b; border-radius: 44px; position: relative;
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .phone-notch { width: 140px; height: 28px; background-color: #1e293b; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 1000; }

        .app-header { background: rgba(255, 255, 255, 0.9); padding: 40px 16px 12px 16px; border-bottom: 2px solid rgba(255,255,255,0.5); display: flex; flex-direction: column; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .profile-box { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 44px; height: 44px; background: #dbeafe; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .name { font-size: 14px; font-weight: 600; color: #1e3a8a; }
        .level { font-size: 12px; font-weight: 700; color: var(--primary-blue); }

        .stat-bar-wrapper { flex: 1; display: flex; align-items: center; background: #f1f5f9; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .stat-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
        .hp-fill { background: linear-gradient(90deg, #f43f5e, #fb7185); }
        .energy-fill { background: linear-gradient(90deg, #eab308, #fcd34d); }
        .stat-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: 700; color: #fff; z-index: 2; }

        .main-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }

        .blob-character { font-size: 140px; margin: 40px 0; text-align: center; animation: float 4s ease-in-out infinite alternate; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-10px); } }

        .home-action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .grid-btn { background: white; border-radius: 16px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--primary-blue); }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="phone-notch"></div>

        <header class="app-header">
            <div class="header-top">
                <div class="profile-box">
                    <div class="avatar">💧</div>
                    <div class="name-box">
                        <span class="name" id="uiPetName">Joy Blob</span>
                        <span class="level" id="uiPetLevel">Lv. 8</span>
                    </div>
                </div>
            </div>
            <div class="header-bottom">
                <div class="stat-bar-wrapper">
                    <div class="stat-bar-fill hp-fill" id="hpFill"></div>
                    <div class="stat-text" id="hpText">45/50</div>
                </div>
                <div class="stat-bar-wrapper">
                    <div class="stat-bar-fill energy-fill" id="energyFill"></div>
                    <div class="stat-text" id="energyText">20/50</div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section id="screen-home" class="screen active">
                <div class="blob-character" id="diningBlob">💧</div>
                <div class="home-action-grid">
                    <div class="grid-btn" onclick="alert('กระเป๋า')"><span>🎒</span><span>กระเป๋า</span></div>
                    <div class="grid-btn" onclick="openScreen('screen-house')"><span>🏠</span><span>บ้าน</span></div>
                    <div class="grid-btn" onclick="openCollection()"><span>🎁</span><span>สะสม</span></div>
                    <div class="grid-btn" onclick="openAchievement()"><span>⭐</span><span>ความสำเร็จ</span></div>
                </div>
            </section>

            <section id="screen-house" class="screen">
                <button onclick="openScreen('screen-home')">← ย้อนกลับ</button>
                <div class="grid-btn" onclick="openScreen('screen-dining')"><span>🍽️</span><span>ห้องอาหาร</span></div>
            </section>

            <section id="screen-dining" class="screen">
                <button onclick="openScreen('screen-house')">← ย้อนกลับ</button>
                <div class="grid-btn" onclick="feedAction('เค้ก', 5, 5)"><span>🍰</span><span>เค้ก</span></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="openScreen('screen-home', this)"><span>🏠</span><span>โฮม</span></div>
            <div class="nav-item" onclick="openScreen('screen-games', this)"><span>🎮</span><span>เกม</span></div>
        </nav>
    </div>

    <script>
        let state = { hp: 45, maxHp: 50, energy: 20, maxEnergy: 50, level: 8, exp: 0 };

        function openScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updateStatsUI() {
            document.getElementById('hpFill').style.width = (state.hp/state.maxHp)*100 + "%";
            document.getElementById('energyFill').style.width = (state.energy/state.maxEnergy)*100 + "%";
            document.getElementById('hpText').innerText = `${state.hp}/${state.maxHp}`;
            document.getElementById('energyText').innerText = `${state.energy}/${state.maxEnergy}`;
        }

        function feedAction(foodName, hp, en) {
            state.hp = Math.min(state.maxHp, state.hp + hp);
            state.energy = Math.min(state.maxEnergy, state.energy + en);
            updateStatsUI();
            
            // ระบบเลเวลอัป
            state.exp += 10;
            if(state.exp >= 100) { state.level++; state.exp = 0; alert("Level Up!"); }
            document.getElementById("uiPetLevel").innerText = `Lv. ${state.level}`;
            
            alert(`ป้อน ${foodName} สำเร็จ!`);
        }

        function openCollection() { alert("เปิดสมุดสะสม"); }
        function openAchievement() { alert("เปิดความสำเร็จ"); }
    </script>
</body>
</html>
