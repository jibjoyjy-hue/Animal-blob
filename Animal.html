<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Joy Blob App</title>
    <style>
        body { font-family: sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .phone { width: 375px; height: 700px; background: white; border-radius: 40px; border: 8px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 40px 20px 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .emoji { font-size: 100px; }
        .controls { padding: 20px; display: flex; gap: 10px; }
        button { padding: 15px 25px; border-radius: 20px; border: none; background: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone">
    <div class="header">Joy Blob</div>
    <div class="content">
        <div id="blob" class="emoji">💧</div>
        <p id="text">วันนี้ไปพักผ่อนกันนะ!</p>
        <div class="controls">
            <button onclick="feed()">ให้อาหาร</button>
            <button onclick="sleep()">นอนหลับ</button>
        </div>
    </div>
</div>

<script>
    function feed() {
        document.getElementById('text').innerText = "ง่ำๆ อร่อยจัง! 💖";
        document.getElementById('blob').innerText = "😋";
        setTimeout(() => { document.getElementById('blob').innerText = "💧"; document.getElementById('text').innerText = "วันนี้ไปพักผ่อนกันนะ!"; }, 1500);
    }
    function sleep() {
        document.getElementById('text').innerText = "ฝันดีนะคะ... 💤";
        document.getElementById('blob').innerText = "😴";
        setTimeout(() => { document.getElementById('blob').innerText = "💧"; document.getElementById('text').innerText = "วันนี้ไปพักผ่อนกันนะ!"; }, 1500);
    }
</script>

</body>
</html>
