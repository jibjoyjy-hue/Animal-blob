<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body { font-family: 'Kanit', sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* โครงตัวเครื่อง */
        .phone { width: 390px; height: 750px; background: #fdfdfd; border-radius: 40px; border: 8px solid #334155; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* Header: เงินและชื่อ */
        .header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .currency { display: flex; gap: 10px; font-weight: 600; color: #475569; }
        
        /* Stats Bar */
        .stats { padding: 0 20px 20px; }
        .bar-container { margin-bottom: 8px; }
        .label { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        .bar { width: 100%; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        .fill { height: 100%; transition: width 0.5s; border-radius: 6px; }

        /* ตัวละคร */
        .character-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .blob-emoji { font-size: 120px; margin-bottom: 20px; }
        .speech-bubble { background: #eff6ff; padding: 15px 25px; border-radius: 25px; font-size: 14px; border: 2px solid #bfdbfe; }

        /* Menu Bar ด้านล่าง */
        .menu-bar { display: flex; justify-content: space-around; padding: 20px; background: white; border-top: 1px solid #e2e8f0; }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 12px; }
        
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 10px; background: #3b82f6; color: white; font-family: inherit; margin: 5px; }
    </style>
</head>
<body>

<div class="phone">
    <!-- Header -->
    <div class="header">
        <div><strong>Joy Blob</strong></div>
        <div class="currency">💰 12,450</div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="label">HP</div>
        <div class="bar"><div id="hpFill" class="fill" style="width: 90%; background: #fb7185;"></div></div>
        <div class="label" style="margin-top: 10px;">Energy</div>
        <div class="bar"><div id="enFill" class="fill" style="width: 80%; background: #60a5fa;"></div></div>
    </div>

    <!-- Character -->
    <div class="character-area">
        <div id="blob" class="blob-emoji">💧</div>
        <div class="speech-bubble" id="bubble">วันนี้ไปพักผ่อนกันนะ!</div>
        <div>
            <button onclick="feedAction()">ให้อาหาร</button>
            <button onclick="sleepAction()">นอนหลับ</button>
        </div>
    </div>

    <!-- Bottom Menu -->
    <div class="menu-bar">
        <div class="menu-item">🎒 กระเป๋า</div>
        <div class="menu-item">🏠 บ้าน</div>
        <div class="menu-item">🎁 ของขวัญ</div>
        <div class="menu-item">📚 สะสม</div>
    </div>
</div>

<script>
    let state = { hp: 45, en: 40 };

    function feedAction() {
        state.hp = Math.min(50, state.hp + 5);
        document.getElementById('bubble').innerText = "ง่ำๆ อร่อยจัง! 💖";
        document.getElementById('blob').innerText = "😋";
        updateUI();
        setTimeout(() => { document.getElementById('blob').innerText = "💧"; document.getElementById('bubble').innerText = "อิ่มจังเลย~"; }, 1500);
    }

    function sleepAction() {
        state.en = Math.min(50, state.en + 10);
        document.getElementById('bubble').innerText = "ฝันดีนะคะ... 💤";
        document.getElementById('blob').innerText = "😴";
        updateUI();
        setTimeout(() => { document.getElementById('blob').innerText = "💧"; document.getElementById('bubble').innerText = "สดชื่นจัง!"; }, 2000);
    }

    function updateUI() {
        document.getElementById('hpFill').style.width = (state.hp/50)*100 + "%";
        document.getElementById('enFill').style.width = (state.en/50)*100 + "%";
    }
</script>

</body>
</html>
