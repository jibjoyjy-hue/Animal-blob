<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joy Blob - Virtual Pet</title>
    <!-- เรียกใช้ Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif, Arial;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* จำลองหน้าจอมือถือ */
        .mobile-container {
            width: 100%;
            max-width: 414px; /* ขนาดหน้าจอมือถือทั่วไป */
            height: 100%;
            max-height: 896px;
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* --- ส่วนหัว (Status Bar) --- */
        .top-bar {
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .profile-section {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .profile-pic {
            width: 45px;
            height: 45px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            border: 2px solid #64b5f6;
            margin-right: 10px;
        }

        .user-info h2 {
            font-size: 16px;
            color: #333;
        }
        
        .level-badge {
            font-size: 12px;
            background: #ffb74d;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-bar {
            flex: 1;
            background: #fff;
            border-radius: 15px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        .stat-bar i.fa-heart { color: #ff5252; margin-right: 5px; }
        .stat-bar i.fa-bolt { color: #ffd600; margin-right: 5px; }

        .currency-row {
            display: flex;
            gap: 10px;
        }

        .currency {
            background: #fff;
            border-radius: 15px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .currency img { width: 16px; margin-right: 5px; }
        .currency i.fa-coins { color: #ffb300; margin-right: 5px; }
        .currency i.fa-gem { color: #00e5ff; margin-right: 5px; }

        /* --- ส่วนเนื้อหาหลัก (Main Area) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .speech-bubble {
            background: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: #333;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: float 3s ease-in-out infinite;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
            display: block;
            width: 0;
        }

        .pet-character {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #82b1ff 0%, #2979ff 100%);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(41, 121, 255, 0.4);
            position: relative;
            animation: bounce 2s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pet-eyes {
            display: flex;
            gap: 30px;
            margin-top: -20px;
        }

        .eye {
            width: 25px;
            height: 35px;
            background: #000;
            border-radius: 50%;
            position: relative;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        .pet-mouth {
            position: absolute;
            bottom: 50px;
            width: 30px;
            height: 15px;
            border-bottom: 4px solid #000;
            border-radius: 0 0 50px 50px;
        }

        /* --- ส่วนเมนูด้านล่าง (Bottom Navigation) --- */
        .bottom-nav {
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #9e9e9e;
            font-size: 11px;
            gap: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 22px;
            background: #f5f5f5;
            padding: 12px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .nav-item.active { color: #2979ff; font-weight: bold; }
        .nav-item.active i { background: #e3f2fd; color: #2979ff; }
        .nav-item:hover i { transform: translateY(-3px); }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Responsive สำหรับ Desktop (แสดงให้อยู่ตรงกลาง) */
        @media (min-width: 415px) {
            body { background-color: #333; }
            .mobile-container { border-radius: 30px; border: 8px solid #222; }
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <!-- Header: Status Bar -->
        <header class="top-bar">
            <div class="profile-section">
                <div class="profile-pic">👩</div>
                <div class="user-info">
                    <h2>Joy Blob</h2>
                    <span class="level-badge">Lv. 8</span>
                </div>
            </div>
            
            <div class="stats-row">
                <div class="stat-bar"><i class="fas fa-heart"></i> 45/50</div>
                <div class="stat-bar"><i class="fas fa-bolt"></i> 42/50</div>
            </div>

            <div class="currency-row">
                <div class="currency"><i class="fas fa-coins"></i> 12,450</div>
                <div class="currency"><i class="fas fa-gem"></i> 230</div>
            </div>
        </header>

        <!-- Main Content: Pet Area -->
        <main class="main-content">
            <div class="speech-bubble" id="pet-speech">
                วันนี้ไปพักผ่อนกันนะ! 💙
            </div>
            
            <div class="pet-character" onclick="pokePet()">
                <div class="pet-eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="pet-mouth"></div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="changeMenu(this)">
                <i class="fas fa-home"></i>
                <span>โฮม</span>
            </div>
            <div class="nav-item" onclick="changeMenu(this)">
                <i class="fas fa-paw"></i>
                <span>สัตว์เลี้ยง</span>
            </div>
            <div class="nav-item" onclick="changeMenu(this)">
                <i class="fas fa-book"></i>
                <span>ไดอารี่</span>
            </div>
            <div class="nav-item" onclick="changeMenu(this)">
                <i class="fas fa-store"></i>
                <span>ร้านค้า</span>
            </div>
            <div class="nav-item" onclick="changeMenu(this)">
                <i class="fas fa-bars"></i>
                <span>เมนู</span>
            </div>
        </nav>

    </div>

    <!-- JavaScript เบื้องต้นสำหรับการโต้ตอบ -->
    <script>
        // เปลี่ยนเมนูด้านล่าง
        function changeMenu(element) {
            // ลบคลาส active จากทุกอัน
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            // เพิ่มคลาส active ให้ตัวที่คลิก
            element.classList.add('active');
        }

        // โต้ตอบกับสัตว์เลี้ยงเมื่อคลิก
        const messages = [
            "วันนี้ไปพักผ่อนกันนะ! 💙",
            "หิวจังเลย ขอของกินหน่อย 🍔",
            "เย่! ดีใจที่ได้เจอคุณนะ ✨",
            "มาเล่นเกมกันเถอะ! 🎮"
        ];

        function pokePet() {
            const speech = document.getElementById('pet-speech');
            // สุ่มข้อความ
            const randomIndex = Math.floor(Math.random() * messages.length);
            speech.innerText = messages[randomIndex];
            
            // เพิ่มเอฟเฟกต์เด้ง
            const pet = document.querySelector('.pet-character');
            pet.style.animation = 'none';
            setTimeout(() => {
                pet.style.animation = 'bounce 2s ease-in-out infinite';
            }, 50);
        }
    </script>
</body>
</html>
