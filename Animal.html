<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob - Home</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Font ภาษาไทย Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- โหลด Icon จาก FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #e5e7eb; }
        .app-container { background: linear-gradient(180deg, #f0f4ff 0%, #e6eeff 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- กรอบหน้าจอแอปมือถือ -->
    <div class="app-container w-full max-w-[400px] h-[800px] bg-white rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col border-[6px] border-white">
        
        <!-- ================= 1. ส่วนหัว (โปรไฟล์ & ทรัพยากร) ================= -->
        <div class="p-5">
            <!-- ข้อมูลโปรไฟล์ -->
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <!-- รูปโปรไฟล์ (แทนที่ด้วยภาพน้อง Blob จริง) -->
                    <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center border-2 border-blue-200">
                        <span class="text-xl">💧</span> 
                    </div>
                    <div>
                        <h1 class="text-blue-900 font-semibold text-lg leading-tight">Joy Blob</h1>
                        <span class="text-xs text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full font-medium">Lv. 8</span>
                    </div>
                </div>
                <button class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-cog text-xl"></i>
                </button>
            </div>

            <!-- แถบพลังงานและทรัพยากร -->
            <div class="grid grid-cols-2 gap-3">
                <!-- HP (สีชมพู) -->
                <div class="bg-pink-100 rounded-full flex items-center justify-between p-1 pr-3 shadow-sm">
                    <div class="w-6 h-6 bg-pink-300 rounded-full flex items-center justify-center text-white text-xs"><i class="fas fa-heart"></i></div>
                    <span class="text-xs font-semibold text-pink-700">45/50</span>
                    <button class="w-5 h-5 bg-pink-400 rounded-full text-white text-xs flex items-center justify-center">+</button>
                </div>
                <!-- พลังงาน (สีส้ม) -->
                <div class="bg-orange-100 rounded-full flex items-center justify-between p-1 pr-3 shadow-sm">
                    <div class="w-6 h-6 bg-orange-300 rounded-full flex items-center justify-center text-white text-xs"><i class="fas fa-bolt"></i></div>
                    <span class="text-xs font-semibold text-orange-700">42/50</span>
                    <button class="w-5 h-5 bg-orange-400 rounded-full text-white text-xs flex items-center justify-center">+</button>
                </div>
                <!-- เหรียญทอง -->
                <div class="bg-yellow-100 rounded-full flex items-center justify-between p-1 pr-3 shadow-sm">
                    <div class="w-6 h-6 bg-yellow-300 rounded-full flex items-center justify-center text-white text-xs"><i class="fas fa-coins"></i></div>
                    <span class="text-xs font-semibold text-yellow-700">12,450</span>
                    <button class="w-5 h-5 bg-blue-400 rounded-full text-white text-xs flex items-center justify-center">+</button>
                </div>
                <!-- เพชร -->
                <div class="bg-blue-100 rounded-full flex items-center justify-between p-1 pr-3 shadow-sm">
                    <div class="w-6 h-6 bg-blue-300 rounded-full flex items-center justify-center text-white text-xs"><i class="fas fa-gem"></i></div>
                    <span class="text-xs font-semibold text-blue-700">230</span>
                    <button class="w-5 h-5 bg-blue-400 rounded-full text-white text-xs flex items-center justify-center">+</button>
                </div>
            </div>
        </div>

        <!-- ================= 2. ส่วนกลาง (ตัวละคร) ================= -->
        <div class="flex-1 flex flex-col items-center justify-center relative px-4">
            
            <!-- กล่องข้อความ -->
            <div class="bg-white/80 backdrop-blur-sm px-4 py-2 rounded-2xl shadow-sm text-sm text-blue-900 font-medium mb-4 relative">
                วันนี้ไปพักผ่อนกันเถอะ! 💙
                <!-- สามเหลี่ยมชี้ลง -->
                <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[6px] border-r-[6px] border-t-[8px] border-l-transparent border-r-transparent border-t-white/80"></div>
            </div>

            <!-- ตัวละคร (แทนที่ด้วยภาพน้อง Blob ขนาดใหญ่) -->
            <div class="w-48 h-48 bg-blue-200 rounded-full flex items-center justify-center shadow-lg border-4 border-white mb-6">
                <span class="text-6xl text-white font-bold">Blob</span>
            </div>
        </div>

        <!-- ================= 3. ปุ่มแอคชั่น (กระเป๋า, บ้าน, ของขวัญ, สะสม) ================= -->
        <div class="flex justify-center gap-6 mb-24">
            <div class="flex flex-col items-center gap-1">
                <button class="w-14 h-14 bg-pink-100 rounded-2xl flex items-center justify-center shadow-sm text-pink-500 text-2xl hover:scale-105 transition"><i class="fas fa-shopping-bag"></i></button>
                <span class="text-[10px] text-gray-600 font-medium">กระเป๋า</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <button class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center shadow-sm text-green-500 text-2xl hover:scale-105 transition"><i class="fas fa-home"></i></button>
                <span class="text-[10px] text-gray-600 font-medium">บ้าน</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <button class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center shadow-sm text-red-400 text-2xl hover:scale-105 transition"><i class="fas fa-gift"></i></button>
                <span class="text-[10px] text-gray-600 font-medium">ของขวัญ</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <button class="w-14 h-14 bg-purple-100 rounded-2xl flex items-center justify-center shadow-sm text-purple-500 text-2xl hover:scale-105 transition"><i class="fas fa-book"></i></button>
                <span class="text-[10px] text-gray-600 font-medium">สะสม</span>
            </div>
        </div>

        <!-- ================= 4. แถบเมนูด้านล่าง (Bottom Navigation) ================= -->
        <div class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.05)] px-4 py-4">
            <div class="flex justify-between items-center text-gray-400">
                <!-- เมนูโฮม (สถานะ Active สีฟ้า) -->
                <button class="flex flex-col items-center gap-1 text-blue-500 w-12">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-[9px] font-medium">โฮม</span>
                </button>
                <button class="flex flex-col items-center gap-1 hover:text-blue-400 w-12">
                    <i class="fas fa-robot text-xl"></i>
                    <span class="text-[9px] font-medium">ทดสอบ+AI</span>
                </button>
                <button class="flex flex-col items-center gap-1 hover:text-blue-400 w-12">
                    <i class="fas fa-book-open text-xl"></i>
                    <span class="text-[9px] font-medium">ไดอารี่</span>
                </button>
                <button class="flex flex-col items-center gap-1 hover:text-blue-400 w-12">
                    <i class="fas fa-scroll text-xl"></i>
                    <span class="text-[9px] font-medium">เควส</span>
                </button>
                <button class="flex flex-col items-center gap-1 hover:text-blue-400 w-12">
                    <i class="fas fa-store text-xl"></i>
                    <span class="text-[9px] font-medium">ร้านค้า</span>
                </button>
                <button class="flex flex-col items-center gap-1 hover:text-blue-400 w-12">
                    <i class="fas fa-gamepad text-xl"></i>
                    <span class="text-[9px] font-medium">มินิเกม</span>
                </button>
            </div>
        </div>

    </div>

</body>
</html>
