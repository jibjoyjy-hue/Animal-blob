<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* ตัวเครื่องแอป */
        .app-container { width: 390px; height: 844px; background: #f8fafc; border-radius: 40px; border: 8px solid #1e293b; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }

        /* Header ข้อมูลสัตว์เลี้ยง */
        .header { padding: 40px 20px 10px; background: white; }
        .pet-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 45px; height: 45px; background: #3b82f6; border-radius: 12px; }
        .currency { display: flex; gap: 10px; margin-bottom: 10px; }
        .currency-item { background: #f1f5f9; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #475569; }

        /* แถบสถานะ (HP/Energy) */
        .status-bars { display: flex; gap: 10px; }
        .bar-wrap { flex: 1; }
        .bar-bg { height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; border-radius: 6px; }

        /* พื้นที่ตัวละคร */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .blob-area { width: 200px; height: 200px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .speech-bubble { background: #eff6ff; padding: 15px 25px; border-radius: 20px; font-weight: 500; color: #334155; border: 2px solid #bfdbfe; }

        /* Navigation Bar ด้านล่าง */
        .navbar { display: flex; justify-content: space-around; padding: 20px 10px; background: white; border-top: 1px solid #e2e8f0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; cursor: pointer; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="header">
        <div class="pet-info">
            <div class="avatar"></div>
            <div>
                <div style="font-weight: 600;">Joy Blob</div>
                <div style="font-size: 12px; color: #64748b;">Lv. 8</div>
            </div>
        </div>
        <div class="currency">
            <div class="currency-item">💰 12,450</div>
            <div class="currency-item">💎 230</div>
        </div>
        <div class="status-bars">
            <div class="bar-wrap">
                <div style="font-size: 10px; font-weight: bold;">HP 45/50</div>
                <div class="bar-bg"><div class="bar-fill" style="width: 90%; background: #ef4444;"></div></div>
            </div>
            <div class="bar-wrap">
                <div style="font-size: 10px; font-weight: bold;">Energy 42/50</div>
                <div class="bar-bg"><div class="bar-fill" style="width: 84%; background: #3b82f6;"></div></div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main-content">
        <div class="blob-area">💧</div>
        <div class="speech-bubble">วันนี้ไปพักผ่อนกันนะ!</div>
    </main>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-item">🏠<br>โฮม</div>
        <div class="nav-item">🤖<br>AI</div>
        <div class="nav-item">📖<br>ไดอารี่</div>
        <div class="nav-item">📝<br>เควส</div>
        <div class="nav-item">🛍️<br>ร้านค้า</div>
    </nav>
</div>

</body>
</html>
