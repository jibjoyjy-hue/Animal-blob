<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Joy Blob - Home</title>
    <style>
        :root {
            --bg-app: #f5f3ff;
            --primary: #c084fc;
            --hp-color: #fb7185;
            --energy-color: #fbbf24;
        }
        body { font-family: 'Kanit', sans-serif; background: #cbd5e1; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 390px; height: 844px; background: var(--bg-app); border-radius: 40px; border: 10px solid #1e293b; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-around; padding: 50px 20px 20px; }
        .bar { width: 40%; height: 20px; background: #e2e8f0; border-radius: 10px; overflow: hidden; position: relative; }
        .fill { height: 100%; transition: width 0.3s; }
        .hp-fill { background: var(--hp-color); }
        .energy-fill { background: var(--energy-color); }

        /* Character Area */
        .character { text-align: center; font-size: 120px; margin: 40px 0; }
        .speech { background: white; padding: 15px; border-radius: 20px; margin: 0 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        button { padding: 15px; border-radius: 15px; border: none; background: white; font-family: inherit; font-weight: 600; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="phone">
    <!-- Stats -->
    <div class="stats-bar">
        <div class="bar"><div id="hpFill" class="fill hp-fill" style="width: 90%;"></div></div>
        <div class="bar"><div id="enFill" class="fill energy-fill" style="width: 80%;"></div></div>
    </div>

    <!-- Character -->
    <div class="character" id="blob">💧</div>
    <div class="speech" id="bubble">สวัสดีจ้า! วันนี้ทำอะไรดีคะ?</div>

    <!-- Actions -->
    <div class="controls">
        <button onclick="feedAction()">ให้อาหาร 🍰</button>
        <button onclick="sleepAction()">เข้านอน 💤</button>
    </div>
</div>

<script>
    let state = { hp: 45, en: 40 };

    function feedAction() {
        state.hp = Math.min(50, state.hp + 5);
        document.getElementById('bubble').innerText = "ง่ำๆ อร่อยจัง! 💖";
        document.getElementById('blob').innerText = "😋";
        updateUI();
        setTimeout(() => document.getElementById('blob').innerText = "💧", 1500);
    }

    function sleepAction() {
        state.en = Math.min(50, state.en + 10);
        document.getElementById('bubble').innerText = "ฝันดีนะคะ... 💤";
        document.getElementById('blob').innerText = "😴";
        updateUI();
        setTimeout(() => document.getElementById('blob').innerText = "💧", 2000);
    }

    function updateUI() {
        document.getElementById('hpFill').style.width = (state.hp/50)*100 + "%";
        document.getElementById('enFill').style.width = (state.en/50)*100 + "%";
    }
</script>

</body>
</html>
