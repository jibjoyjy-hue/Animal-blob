<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Blob - My Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Core */
        body { font-family: 'Kanit', sans-serif; background: #cbd5e1; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .phone { width: 390px; height: 844px; background: #f5f3ff; border-radius: 40px; border: 10px solid #1e293b; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { padding: 40px 20px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .nav { height: 80px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #e2e8f0; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { padding: 15px; background: #a855f7; color: white; border: none; border-radius: 15px; width: 100%; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone">
    <header class="header">
        <div id="status">ยินดีต้อนรับสู่ Joy Blob!</div>
    </header>
    
    <main class="content">
        <section id="home" class="screen active">
            <div style="font-size: 100px; text-align: center; margin: 40px 0;">💧</div>
            <button class="btn" onclick="openScreen('house')">เข้าสู่โหมดบ้าน</button>
        </section>

        <section id="house" class="screen">
            <h3>บ้านของน้อง</h3>
            <button class="btn" onclick="openScreen('home')">กลับหน้าโฮม</button>
        </section>
    </main>

    <nav class="nav">
        <div onclick="openScreen('home')">🏠 โฮม</div>
        <div onclick="openScreen('diary')">📔 ไดอารี่</div>
    </nav>
</div>

<script>
    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
